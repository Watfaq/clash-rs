name: Coverage

on:
  push:
    tags: ["v*"]
    branches: ["master"]
  pull_request:
    branches: ["master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    name: Coverage
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["macos-15-intel", "windows-latest", "ubuntu-latest"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: coverage-${{ hashFiles('**/Cargo.toml') }}-${{ matrix.os }}
      - uses: ilammy/setup-nasm@v1
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "23.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker (macOS via colima)
        if: runner.os == 'macOS'
        run: |
          brew install socket_vmnet colima docker
          # socket_vmnet gives colima a real VM IP reachable from macOS for
          # both TCP *and* UDP (Lima's default SSH-based forwarding is TCP-only,
          # which breaks QUIC/WireGuard tests).
          sudo brew services start socket_vmnet
          sleep 2
          colima start --cpu 2 --memory 4 --network-address
          sudo ln -sf "$HOME/.colima/default/docker.sock" /var/run/docker.sock

          # Extract the VM's routable IP. With --network-address colima assigns
          # a vmnet-host IP (e.g. 192.168.105.x) reachable from macOS.
          COLIMA_JSON=$(colima ls --json)
          echo "colima ls output: $COLIMA_JSON"
          COLIMA_IP=$(echo "$COLIMA_JSON" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          entry = d[0] if isinstance(d, list) else d
          print(entry.get('address', ''))
          " 2>/dev/null || true)
          echo "Extracted colima IP: '${COLIMA_IP}'"

          if [ -z "${COLIMA_IP}" ]; then
            # Fallback: try SSH into the VM to get its IP
            COLIMA_IP=$(colima ssh -- hostname -I 2>/dev/null | awk '{print $1}' || true)
            echo "SSH fallback IP: '${COLIMA_IP}'"
          fi

          if [ -n "${COLIMA_IP}" ]; then
            echo "Using colima VM IP for both TCP and UDP tests"
            echo "CLASH_DOCKER_HOST_IP=${COLIMA_IP}" >> $GITHUB_ENV
          else
            # socket_vmnet did not assign a routable IP; fall back to Lima's
            # TCP-only SSH port-forwarding via 127.0.0.1. UDP-transport tests
            # (hysteria2, shadowquic, tuic, wg) will be skipped automatically.
            echo "::warning::Could not get colima VM IP; using 127.0.0.1 (TCP only)"
            echo "CLASH_DOCKER_USE_HOST_IP=true" >> $GITHUB_ENV
          fi

      - name: Cargo test and coverage
        uses: clechasseur/rs-cargo@v4
        with:
          tool: cross
          command: "llvm-cov"
          args: --workspace --exclude clash-ffi -F "plus" --codecov --output-path codecov.json
        env:
          CROSS_CONTAINER_OPTS: "--network host"
          CLASH_DOCKER_TEST: ${{ runner.os != 'Windows' && 'true' || 'false' }}
          TS_AUTH_KEY: ${{ secrets.TS_AUTH_KEY }}
          RUST_LOG: ts_control=debug,ts_runtime=debug,tailscale=debug

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: codecov.json
          fail_ci_if_error: true
