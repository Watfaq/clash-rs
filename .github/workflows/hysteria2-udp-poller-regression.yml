name: Hysteria2 UDP Poller Regression

on:
  push:
    branches:
      - fix/hysteria2-udp-poller-refresh

permissions:
  contents: read

jobs:
  regression:
    name: Hysteria2 UDP poller regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Run regression test
        env:
          RUSTFLAGS: -A dead-code
        run: >-
          cargo test -p clash-lib
          --no-default-features
          --features aws-lc-rs
          --lib --
          proxy::hysteria2::udp_hop::tests
          --nocapture
