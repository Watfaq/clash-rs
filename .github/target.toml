# Clash-rs Build Target Configuration
# Adapted from tuic template: defines build targets used by reusable workflows

[[target]]
os = "ubuntu-latest"
target = "x86_64-unknown-linux-gnu"
release-name = "x86_64-linux"
tool = "cross"
extra-args = "--features jemallocator"
zig = "2.17"

[[target]]
os = "ubuntu-latest"
target = "x86_64-unknown-linux-musl"
release-name = "x86_64-linux-musl"
tool = "cross"
extra-args = "--features jemallocator"

[[target]]
os = "ubuntu-latest"
target = "aarch64-unknown-linux-gnu"
release-name = "aarch64-linux"
tool = "cross"
extra-args = "--features jemallocator"

[[target]]
os = "windows-latest"
target = "x86_64-pc-windows-msvc"
release-name = "x86_64-windows"
postfix = ".exe"

[[target]]
os = "macos-latest"
target = "aarch64-apple-darwin"
release-name = "aarch64-darwin"
extra-args = "--features jemallocator"
