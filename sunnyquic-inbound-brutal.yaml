# SunnyQUIC inbound using shadowquic/noq's existing Brutal controller.
listeners:
  - name: sunnyquic-brutal-in
    type: sunnyquic
    listen: 0.0.0.0
    port: 1443
    allow-lan: true

    server-name: example.com
    certificate: /etc/clash-rs/certs/example.com.crt
    private-key: /etc/clash-rs/certs/example.com.key

    # All names, including those beginning with "admin", are ordinary users;
    # the user-management API is disabled.
    users:
      - name: alice
        password: "replace-with-a-strong-password"

    alpn: [h3]
    congestion-control:
      brutal:
        # Server upload bandwidth in bits per second. "100M" is also accepted.
        bandwidth: 100000000
        min-window: 16384
        cwnd-gain: 1.1
        min-ack-rate: 0.8
        min-sample-count: 50
        ack-compensate: false

    zero-rtt: true
    initial-mtu: 1300
    min-mtu: 1290
    max-path-num: 12
    gso: true
    mtu-discovery: true
