# Purpose: Shadowsocks proxy config for docker integration tests.
# Also used as a proxy-provider file by rules.yaml (file-provider path: ./ss.yaml).
# Server config: ss.json (docker)

port: 8888
socks-port: 8889
mixed-port: 8899

mode: rule
log-level: debug
external-controller: 127.0.0.1:6170

proxies:
  - name: "ss-01"
    type: ss
    server: 10.0.0.13
    port: 8388
    cipher: aes-256-gcm
    password: "password"
    udp: true
    connect-via: ss-02   # chain: ss-01 -> ss-02 -> target

  - name: "ss-02"
    type: ss
    server: 10.0.0.13
    port: 8388
    cipher: aes-256-gcm
    password: "password"
    udp: true

  - name: ss-2022
    type: ss
    server: 127.0.0.1
    port: 8390
    cipher: 2022-blake3-aes-256-gcm
    # SS2022 multi-user format: server-key:user-key
    password: 3SYJ/f8nmVuzKvKglykRQDSgg10e/ADilkdRWrrY9HU=:4w0GKJ9U3Ox7CIXGU4A3LDQAqP6qrp/tUi/ilpOR9p4=

proxy-groups:
  - name: "udp-relay"
    type: relay
    proxies:
      - ss-01
      - ss-02
      - ss-2022

rules:
  - MATCH, ss-2022
