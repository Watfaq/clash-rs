# Purpose: VLESS over WebSocket + TLS client config for docker integration tests.
# Server config: vless-ws-tls.json (docker)

port: 8888
socks-port: 8889
mixed-port: 8899

mode: rule
log-level: debug
external-controller: 127.0.0.1:6170

proxies:
  - name: "vless-ws-tls"
    type: vless
    server: 127.0.0.1
    port: 8443
    tls: true
    servername: example.com
    network: ws
    skip-cert-verify: true
    uuid: b831381d-6324-4d53-ad4f-8cda48b30811
    ws-opts:
      path: /websocket
      headers:
        Host: example.com
    udp: true

proxy-groups:
  - name: "udp-relay"
    type: relay
    proxies:
      - vless-ws-tls

rules:
  - MATCH, vless-ws-tls
