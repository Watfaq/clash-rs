# Purpose: Tor proxy config. Routes all traffic through the embedded Tor client.
# Requires the `onion` feature flag to be enabled at compile time.

port: 8888
socks-port: 8889
mixed-port: 8899

mode: rule
log-level: debug
external-controller: 127.0.0.1:6170

proxies:
  - name: "tor"
    type: tor

rules:
  - MATCH, tor
