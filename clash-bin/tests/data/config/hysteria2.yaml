# Purpose: Hysteria2 client config for integration tests.
# Connects to a local Hysteria2 server (started by the test harness).

port: 8891
socks-port: 8889
mixed-port: 8888

allow-lan: true
mode: rule
log-level: debug
external-controller: 127.0.0.1:6170

proxies:
  - name: "local"
    type: hysteria2
    server: 127.0.0.1
    port: 10086
    password: passwd
    sni: example.com
    skip-cert-verify: true
    obfs: salamander
    obfs-password: "passwd"

rules:
  - MATCH, local
